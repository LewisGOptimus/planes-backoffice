services:
  db:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: planes-poc-db
    environment:
      POSTGRES_DB: planes_poc
      POSTGRES_USER: planes
      POSTGRES_PASSWORD: planes_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planes -d planes_poc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
